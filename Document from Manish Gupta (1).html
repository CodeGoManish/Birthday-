<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a0a2e;
    --gold: #e8c875;
    --rose: #c2637a;
    --violet: #7c5cbf;
    --cream: #fdf6ec;
    --dim: rgba(255,255,255,0.07);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--ink);
    font-family: 'DM Sans', sans-serif;
    color: var(--cream);
    cursor: none;
  }

  /* ── Custom cursor ── */
  #cursor {
    width: 12px; height: 12px;
    background: var(--gold);
    border-radius: 50%;
    position: fixed; pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%);
    transition: transform 0.08s, width 0.2s, height 0.2s, opacity 0.2s;
    mix-blend-mode: difference;
  }
  #cursor.big { width: 40px; height: 40px; opacity: 0.5; }

  /* ── Night sky canvas ── */
  #stars { position: fixed; inset: 0; z-index: 0; }

  /* ── Phase 1: Sealed envelope ── */
  #envelopeScene {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
  }

  .env-wrap {
    position: relative;
    animation: envFloat 4s ease-in-out infinite;
    cursor: none;
  }
  @keyframes envFloat {
    0%,100% { transform: translateY(0) rotate(-2deg); }
    50%      { transform: translateY(-18px) rotate(2deg); }
  }
  .env-wrap:hover { animation: envPulse 0.6s ease infinite alternate; }
  @keyframes envPulse {
    from { transform: scale(1) rotate(-2deg); }
    to   { transform: scale(1.06) rotate(2deg); }
  }

  .envelope {
    width: 240px; height: 170px;
    position: relative;
  }
  .env-body {
    width: 100%; height: 100%;
    background: linear-gradient(160deg, #2d1a5e, #1a0a3a);
    border-radius: 6px 6px 12px 12px;
    border: 1px solid rgba(232,200,117,0.3);
    box-shadow: 0 0 60px rgba(124,92,191,0.4), inset 0 0 30px rgba(255,255,255,0.03);
    position: relative; overflow: hidden;
  }
  .env-flap {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 55%;
    background: linear-gradient(170deg, #3a2270, #231050);
    clip-path: polygon(0 0, 100% 0, 50% 85%);
    border-radius: 6px 6px 0 0;
    border-bottom: 1px solid rgba(232,200,117,0.2);
    transform-origin: top center;
    transition: transform 0.8s cubic-bezier(0.23,1,0.32,1);
  }
  .env-left {
    position: absolute; bottom: 0; left: 0;
    width: 50%; height: 65%;
    background: linear-gradient(135deg, #231050, #1a0a3a);
    clip-path: polygon(0 100%, 0 0, 100% 100%);
  }
  .env-right {
    position: absolute; bottom: 0; right: 0;
    width: 50%; height: 65%;
    background: linear-gradient(225deg, #2d1a5e, #1a0a3a);
    clip-path: polygon(100% 100%, 100% 0, 0 100%);
  }
  .env-seal {
    position: absolute; bottom: 28%; left: 50%;
    transform: translateX(-50%);
    width: 42px; height: 42px;
    background: radial-gradient(circle at 40% 35%, #e8c875, #c49a20);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(232,200,117,0.6);
    z-index: 2;
  }
  .env-label {
    font-family: 'Playfair Display', serif;
    font-size: 11px; letter-spacing: 3px;
    color: rgba(232,200,117,0.7);
    text-transform: uppercase;
    text-align: center;
  }
  .tap-hint {
    font-size: 13px; letter-spacing: 2px; color: rgba(253,246,236,0.5);
    text-transform: uppercase;
    animation: blink 2s ease infinite;
  }
  @keyframes blink { 0%,100%{opacity:0.5} 50%{opacity:1} }

  /* ── Phase 2: The card ── */
  #card {
    position: fixed; inset: 0; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.8s ease;
    overflow-y: auto; padding: 20px 16px;
  }
  #card.show { opacity: 1; pointer-events: all; }

  .card-inner {
    width: 100%; max-width: 560px;
    background: linear-gradient(160deg, rgba(45,26,94,0.85), rgba(26,10,58,0.92));
    border: 1px solid rgba(232,200,117,0.25);
    border-radius: 24px;
    padding: 48px 40px 40px;
    backdrop-filter: blur(20px);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
    text-align: center;
    position: relative;
    transform: translateY(40px) scale(0.95);
    transition: transform 1s cubic-bezier(0.23,1,0.32,1) 0.3s;
  }
  #card.show .card-inner { transform: translateY(0) scale(1); }

  .ornament {
    position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    border-radius: 2px;
  }

  .top-badge {
    display: inline-block;
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold); border: 1px solid rgba(232,200,117,0.3);
    padding: 5px 16px; border-radius: 20px;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 8vw, 64px);
    line-height: 1.1;
    background: linear-gradient(135deg, #fdf6ec 20%, #e8c875 60%, #c2637a);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 14px; letter-spacing: 2px; color: rgba(253,246,236,0.4);
    text-transform: uppercase; margin-bottom: 32px;
  }

  .message-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 28px;
    font-size: 16px; line-height: 1.8; color: rgba(253,246,236,0.85);
    font-weight: 300;
    min-height: 80px;
    position: relative;
  }
  .message-box::before {
    content: '\201C';
    font-family: 'Playfair Display', serif;
    font-size: 60px; color: var(--gold); opacity: 0.2;
    position: absolute; top: -4px; left: 14px; line-height: 1;
  }

  /* Cake counter */
  .cake-row {
    display: flex; align-items: center; justify-content: center;
    gap: 20px; margin-bottom: 28px;
  }
  .candle-btn {
    background: none; border: none; cursor: none;
    font-size: 28px;
    transition: transform 0.2s;
    position: relative;
  }
  .candle-btn:hover { transform: scale(1.2) rotate(-5deg); }
  .count-display {
    font-family: 'Playfair Display', serif;
    font-size: 48px; color: var(--gold);
    min-width: 70px; text-align: center;
  }
  .count-label {
    font-size: 11px; letter-spacing: 2px; color: rgba(253,246,236,0.4);
    text-transform: uppercase; margin-top: 4px;
  }

  /* Buttons */
  .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn {
    padding: 13px 28px;
    border-radius: 50px; font-size: 14px; font-weight: 500;
    letter-spacing: 0.5px; cursor: none;
    border: none; transition: all 0.25s ease;
  }
  .btn-primary {
    background: linear-gradient(135deg, #e8c875, #c49a20);
    color: #1a0a2e;
    box-shadow: 0 8px 24px rgba(232,200,117,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(232,200,117,0.5); }
  .btn-ghost {
    background: rgba(255,255,255,0.06);
    color: rgba(253,246,236,0.7);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.12); color: var(--cream); }

  /* Wish ticker */
  #wishTicker {
    margin-top: 24px; padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-family: 'Playfair Display', serif;
    font-style: italic; font-size: 15px;
    color: rgba(253,246,236,0.5);
    min-height: 44px;
  }

  /* Firework canvas */
  #fx { position: fixed; inset: 0; z-index: 15; pointer-events: none; }

  /* Ribbon decorations */
  .ribbon-top-left, .ribbon-top-right {
    position: absolute; top: -24px; font-size: 28px;
    animation: ribbonSway 3s ease-in-out infinite;
  }
  .ribbon-top-left { left: -8px; animation-delay: 0.4s; }
  .ribbon-top-right { right: -8px; }
  @keyframes ribbonSway {
    0%,100% { transform: rotate(-15deg) scale(1); }
    50%      { transform: rotate(10deg) scale(1.1); }
  }
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="stars"></canvas>
<canvas id="fx"></canvas>

<!-- Phase 1: Envelope -->
<div id="envelopeScene">
  <div class="env-wrap" id="envWrap" onclick="openEnvelope()">
    <div class="envelope">
      <div class="env-body">
        <div class="env-left"></div>
        <div class="env-right"></div>
        <div class="env-flap" id="envFlap"></div>
        <div class="env-seal">🌙</div>
      </div>
    </div>
  </div>
  <div class="env-label">For someone very special</div>
  <div class="tap-hint">✦ tap to open ✦</div>
</div>

<!-- Phase 2: Card -->
<div id="card">
  <div class="card-inner">
    <div class="ribbon-top-left">🎀</div>
    <div class="ribbon-top-right">🎀</div>
    <div class="ornament"></div>
    <div class="top-badge">✦ A celebration ✦</div>
    <h1>Happy<br>Birthday</h1>
    <div class="subtitle">today is all yours</div>

    <div class="message-box" id="msgBox">
      <span id="msgText"></span><span id="cursor2" style="color:var(--gold);animation:blink 0.7s infinite">|</span>
    </div>

    <!-- Candle counter -->
    <div class="cake-row">
      <button class="candle-btn" onclick="addCandle()" title="Add candle">➕</button>
      <div>
        <div class="count-display" id="candleCount">1</div>
        <div class="count-label">🕯 candles lit</div>
      </div>
      <button class="candle-btn" onclick="blowCandle()" title="Blow out">💨</button>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="launchFireworks()">🎆 Fireworks</button>
      <button class="btn btn-ghost" onclick="nextWish()">✨ New Wish</button>
      <button class="btn btn-ghost" onclick="toggleMusic()">🎵 <span id="musicLabel">Play Music</span></button>
    </div>

    <div id="wishTicker" id="wishArea"></div>
  </div>
</div>

<script>
// ─── Cursor ────────────────────────────────────────
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});
document.querySelectorAll('button,.env-wrap').forEach(el => {
  el.addEventListener('mouseenter', () => cur.classList.add('big'));
  el.addEventListener('mouseleave', () => cur.classList.remove('big'));
});

// ─── Starfield ─────────────────────────────────────
const sc = document.getElementById('stars');
const sctx = sc.getContext('2d');
let W, H, stars = [];
function resizeStars() {
  W = sc.width = window.innerWidth;
  H = sc.height = window.innerHeight;
}
function initStars() {
  stars = Array.from({length:180}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*1.4+0.3,
    a: Math.random(), da: (Math.random()*0.004+0.001)*(Math.random()<0.5?1:-1)
  }));
}
function drawStars() {
  sctx.clearRect(0,0,W,H);
  stars.forEach(s => {
    s.a = Math.max(0.1, Math.min(1, s.a + s.da));
    if(s.a<=0.1||s.a>=1) s.da *= -1;
    sctx.beginPath();
    sctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    sctx.fillStyle = `rgba(253,246,236,${s.a})`;
    sctx.fill();
  });
  requestAnimationFrame(drawStars);
}
window.addEventListener('resize', () => { resizeStars(); initStars(); });
resizeStars(); initStars(); drawStars();

// ─── Fireworks canvas ─────────────────────────────
const fc = document.getElementById('fx');
const fctx = fc.getContext('2d');
fc.width = window.innerWidth; fc.height = window.innerHeight;
window.addEventListener('resize', () => { fc.width = window.innerWidth; fc.height = window.innerHeight; });
let particles = [];

class Particle {
  constructor(x,y,color) {
    this.x=x; this.y=y; this.color=color;
    const a = Math.random()*Math.PI*2;
    const v = Math.random()*7+2;
    this.vx = Math.cos(a)*v; this.vy = Math.sin(a)*v;
    this.alpha = 1; this.gravity = 0.1;
    this.size = Math.random()*3+1;
  }
  update() {
    this.vy += this.gravity;
    this.x += this.vx; this.y += this.vy;
    this.alpha -= 0.018;
    this.vx *= 0.98; this.vy *= 0.98;
  }
  draw(ctx) {
    ctx.save(); ctx.globalAlpha = Math.max(0,this.alpha);
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
  }
}

const fwColors = ['#e8c875','#c2637a','#7c5cbf','#5ecfe3','#f8a4c8','#fff'];
function burst(x,y) {
  const c = fwColors[Math.floor(Math.random()*fwColors.length)];
  for(let i=0;i<80;i++) particles.push(new Particle(x,y,c));
  // shooting star trail
  for(let i=0;i<15;i++) {
    const t = new Particle(x,y,'rgba(255,255,255,0.8)');
    t.size = 1; particles.push(t);
  }
}

let fxRunning = false;
function fxLoop() {
  fctx.clearRect(0,0,fc.width,fc.height);
  particles = particles.filter(p => p.alpha > 0);
  particles.forEach(p => { p.update(); p.draw(fctx); });
  if(particles.length > 0 || fxRunning) requestAnimationFrame(fxLoop);
}

let fxTimer = null;
function launchFireworks() {
  fxRunning = true; fxLoop();
  let count = 0;
  clearInterval(fxTimer);
  fxTimer = setInterval(() => {
    burst(Math.random()*fc.width, Math.random()*(fc.height*0.7));
    count++;
    if(count > 14) { clearInterval(fxTimer); fxRunning = false; }
  }, 260);
}

// click anywhere fires a burst after card opens
document.getElementById('card').addEventListener('click', e => {
  if(e.target.tagName!=='BUTTON') { burst(e.clientX,e.clientY); fxLoop(); }
});

// ─── Envelope open ────────────────────────────────
function openEnvelope() {
  const flap = document.getElementById('envFlap');
  flap.style.transform = 'rotateX(-180deg)';
  flap.style.transition = 'transform 0.6s cubic-bezier(0.23,1,0.32,1)';
  setTimeout(() => {
    document.getElementById('envelopeScene').style.opacity = '0';
    document.getElementById('envelopeScene').style.transform = 'scale(0.9)';
    document.getElementById('envelopeScene').style.transition = 'all 0.5s ease';
    setTimeout(() => {
      document.getElementById('envelopeScene').style.display = 'none';
      const card = document.getElementById('card');
      card.classList.add('show');
      typeMessage(messages[0], 0);
      setTimeout(launchFireworks, 600);
      startAmbient();
    }, 500);
  }, 700);
}

// ─── Typewriter ───────────────────────────────────
const messages = [
  "Today, the universe paused — just to celebrate the day you arrived. You are not just a year older, you are a year more magnificent.",
  "Every star in this sky has a story. Tonight they shine a little brighter because of you.",
  "Wishing you a year so full of joy that even Mondays feel like Saturdays.",
  "May this year bring you adventures worth telling, people worth keeping, and moments worth framing.",
  "You deserve every good thing — and this year, may every good thing find its way to you."
];
let msgIdx = 0, typeTimeout = null;

function typeMessage(text, i) {
  const el = document.getElementById('msgText');
  if(i===0) el.textContent = '';
  clearTimeout(typeTimeout);
  if(i < text.length) {
    el.textContent += text[i];
    typeTimeout = setTimeout(() => typeMessage(text, i+1), 28);
  }
}

function nextWish() {
  msgIdx = (msgIdx+1) % messages.length;
  typeMessage(messages[msgIdx], 0);
  // shimmer effect
  const box = document.getElementById('msgBox');
  box.style.borderColor = 'rgba(232,200,117,0.5)';
  setTimeout(() => box.style.borderColor = 'rgba(255,255,255,0.08)', 600);
  // flash firework
  burst(Math.random()*fc.width, Math.random()*(fc.height*0.5)); fxLoop();
}

// ─── Wish ticker ──────────────────────────────────
const wishes = [
  "✦ May every dream you dare to dream come true",
  "✦ Here's to laughter that makes your stomach hurt",
  "✦ May your year be golden, wild, and entirely yours",
  "✦ Cheers to you — the best kind of rare",
  "✦ May joy follow you the way confetti follows a good party",
  "✦ Wishing you a heart full of love and a glass full of something delicious",
];
let wishIdx = 0;
const wishEl = document.getElementById('wishTicker');

function cycleWish() {
  wishEl.style.opacity = '0';
  wishEl.style.transform = 'translateY(8px)';
  wishEl.style.transition = 'all 0.4s ease';
  setTimeout(() => {
    wishIdx = (wishIdx+1) % wishes.length;
    wishEl.textContent = wishes[wishIdx];
    wishEl.style.opacity = '1';
    wishEl.style.transform = 'translateY(0)';
  }, 400);
}
setInterval(cycleWish, 4200);
wishEl.textContent = wishes[0];

// ─── Candle counter ───────────────────────────────
let candles = 1;
const candleEl = document.getElementById('candleCount');
function addCandle() {
  if(candles < 99) { candles++; candleEl.textContent = candles; }
  burst(Math.random()*fc.width*0.4+fc.width*0.3, fc.height*0.5);
  fxLoop();
}
function blowCandle() {
  if(candles > 0) { candles--; candleEl.textContent = candles; }
  // snow of sparkles
  for(let i=0;i<30;i++) {
    const p = new Particle(fc.width/2, fc.height*0.5, '#e8c875');
    p.vy = -Math.random()*5-2; p.vx = (Math.random()-0.5)*4;
    p.size = 1.5; particles.push(p);
  }
  fxLoop();
}

// ─── Music ────────────────────────────────────────
let audioCtx = null, musicOn = false, musicLoop = null;

function startAmbient() {
  // auto-play a soft melodic note occasionally as ambient
}

function toggleMusic() {
  const lbl = document.getElementById('musicLabel');
  if(musicOn) {
    musicOn = false; lbl.textContent = 'Play Music';
    if(audioCtx) { audioCtx.suspend(); }
    return;
  }
  musicOn = true; lbl.textContent = 'Stop Music';
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return;
  if(!audioCtx) audioCtx = new AC();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  playMelody();
}

function playMelody() {
  if(!musicOn || !audioCtx) return;
  // Happy Birthday extended + harmonics
  const notes = [261.63,261.63,293.66,261.63,349.23,329.63,
                 261.63,261.63,293.66,261.63,392,349.23,
                 261.63,261.63,523.25,440,349.23,329.63,293.66,
                 466.16,466.16,440,349.23,392,349.23];
  const durs  = [0.4,0.15,0.5,0.5,0.5,1.2,
                 0.4,0.15,0.5,0.5,0.5,1.2,
                 0.4,0.15,0.5,0.5,0.5,0.5,1.0,
                 0.4,0.15,0.5,0.5,0.5,1.4];
  let t = audioCtx.currentTime + 0.1;
  let total = 0;
  notes.forEach((freq,i) => {
    ['triangle','sine'].forEach((type,hi) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = hi===1 ? freq*2 : freq;
      gain.gain.setValueAtTime(hi===1 ? 0.04 : 0.08, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + durs[i] - 0.05);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(t); osc.stop(t + durs[i] - 0.04);
    });
    t += durs[i] * 0.5; total += durs[i] * 0.5;
  });
  if(musicOn) musicLoop = setTimeout(playMelody, total*1000 + 800);
}

// ─── Ambient confetti ────────────────────────────
function spawnPetal() {
  if(document.getElementById('card').classList.contains('show')) {
    const el = document.createElement('div');
    const emojis = ['✦','✧','·','⋆','°'];
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.cssText = `position:fixed;z-index:8;pointer-events:none;
      left:${Math.random()*100}vw;top:-20px;
      font-size:${Math.random()*10+8}px;
      color:rgba(232,200,117,${Math.random()*0.5+0.1});
      animation:fall ${Math.random()*5+4}s linear forwards`;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}
const style = document.createElement('style');
style.textContent = `@keyframes fall { to { transform: translateY(110vh) rotate(${Math.random()*720}deg); opacity:0; } }`;
document.head.appendChild(style);
setInterval(spawnPetal, 350);
</script>
</body>
</html>
